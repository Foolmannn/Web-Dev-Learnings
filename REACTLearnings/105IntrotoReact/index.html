<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            color: red;
            border: 2px solid black;
            padding: 3px;


        }
    </style>
</head>
<body>
    <div class="box box1">I am box1</div>
    <div class="box box2">I am box2</div>
    <div class="box box3">I am box3</div>
    <div class="box box4">I am box4</div>
    <script>
        setTimeout(()=>{
            document.body.querySelector(".box1").innerHTML="Hey"

        },1000);
        setTimeout(()=>{
            document.body.querySelector(".box2").innerHTML="Hi"

        },2000);
        setTimeout(()=>{
            document.body.querySelector(".box3").innerHTML="Hello"

        },3000);
        setTimeout(()=>{
            document.body.querySelector(".box4").innerHTML="Welcome"

        },4000);
    </script>
</body>
</html>
